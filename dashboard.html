<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow Dashboard</title>

    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

    <div class="dashboard-layout">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <h2>TaskFlow</h2>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-item active">Today</button>
                <button class="nav-item">Upcoming</button>
                <button class="nav-item">Completed</button>
                <button class="nav-item">Archive</button>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <!-- Top Bar -->
            <header class="topbar">
                <h1>Today's Tasks</h1>

                <button class="btn btn-primary" id="openModalBtn">
                    + Add Task
                </button>
            </header>

            <!-- Quick Add -->
            <section class="quick-add">
                <input type="text" id="quickTaskInput" placeholder="Add a quick task..." />

                <button class="btn btn-primary" id="quickAddBtn">
                    Add
                </button>
            </section>

            <!-- Task List -->
            <section class="task-section">

                <div class="task-list" id="taskList">

                    <div class="task-card">
                        <div class="task-check"></div>

                        <div class="task-content">
                            <h3>Finish dashboard UI</h3>
                            <p>Create responsive dashboard layout and task system.</p>
                        </div>

                        <div class="task-priority high">
                            High
                        </div>
                    </div>

                    <div class="task-card completed">
                        <div class="task-check checked"></div>

                        <div class="task-content">
                            <h3>Build landing page</h3>
                            <p>Complete homepage sections and CTA.</p>
                        </div>

                        <div class="task-priority low">
                            Done
                        </div>
                    </div>

                </div>

            </section>

        </main>
    </div>

    <!-- Modal -->
    <div class="modal" id="taskModal">

        <div class="modal-content">

            <div class="modal-header">
                <h2>Add New Task</h2>

                <button class="close-modal" id="closeModalBtn">
                    ×
                </button>
            </div>

            <form class="task-form">

                <div class="form-group">
                    <label>Task Title</label>

                    <input type="text" placeholder="Enter task title" />
                </div>

                <div class="form-group">
                    <label>Description</label>

                    <textarea placeholder="Task description"></textarea>
                </div>

                <div class="form-row">

                    <div class="form-group">
                        <label>Priority</label>

                        <select>
                            <option>Low</option>
                            <option selected>Medium</option>
                            <option>High</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Date</label>

                        <input type="date" />
                    </div>

                </div>

                <button class="btn btn-primary">
                    Save Task
                </button>

            </form>
        </div>
    </div>

    <script src="js/dashboard.js"></script>

</body>

</html>
